services:

  ########################################################################################
  ########################################################################################
  db:
    image: pgvector/pgvector:pg17
    container_name: db
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  ########################################################################################
  ########################################################################################
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  ########################################################################################
  ########################################################################################
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 10

  ########################################################################################
  ########################################################################################
  # model-init:
  #   image: ollama/ollama:latest
  #   container_name: model-init
  #   tty: true
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   environment:
  #     - OLLAMA_HOST=ollama:11434
  #   entrypoint: /bin/sh
  #   command: 
  #     - "-c"
  #     - |
  #       echo "Pulling LLM..."
  #       ollama pull qwen2.5:1.5b
  #       echo "Pulling Embedding..."
  #       ollama pull bge-m3
  #       echo "Pulling Reranker..."
  #       ollama pull bge-reranker-v2-m3
  #       echo "System Ready."
        
  #   depends_on:
  #     ollama:
  #       condition: service_healthy

  ########################################################################################
  ########################################################################################
  api:
    build: ./api
    container_name: api
    command: python -m app.main
    env_file: .env
    ports:
      - 8000:8000
    volumes:
      - ./api:/code
    depends_on:
      db:
        condition: service_started
      ollama:
        condition: service_healthy
      redis:
        condition: service_started

  ########################################################################################
  ########################################################################################
  dashboard:
    build: ./dashboard
    container_name: dashboard
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true 
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    depends_on:
      api:
        condition: service_started

  ########################################################################################
  ########################################################################################
  worker:
    build: ./api
    container_name: worker
    command: taskiq worker app.taskiq.main:broker # --reload --reload-dir app --log-level DEBUG
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONDONTWRITEBYTECODE=1
      - WATCHFILES_FORCE_POLLING=1 
    volumes:
      - ./api:/code
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started

  ########################################################################################
  ########################################################################################
  scheduler:
    build: ./api
    container_name: scheduler
    command: taskiq scheduler app.taskiq.main:scheduler
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./api:/code
    depends_on:
      redis:
        condition: service_started

  ########################################################################################
  ########################################################################################
  # open-webui:
