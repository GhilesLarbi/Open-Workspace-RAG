services:
  db:
    image: postgres:15
    container_name: db
    env_file: .env
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  api:
    build: .
    container_name: api
    command: python -m app.main
    env_file: .env
    ports:
      - 8000:8000
    volumes:
      - .:/code
    depends_on:
      - db

volumes:
  postgres_data: